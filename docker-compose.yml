version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baseagent
      POSTGRES_PASSWORD: baseagent
      POSTGRES_DB: baseagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://baseagent:baseagent@postgres:5432/baseagent
      REDIS_URL: redis://redis:6379
      API_PORT: "3001"
      API_HOST: "0.0.0.0"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agents:
    build:
      context: .
      dockerfile: apps/agents/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://baseagent:baseagent@postgres:5432/baseagent
      REDIS_URL: redis://redis:6379
      API_SERVICE_URL: http://api:3001
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
